services:
  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    restart: unless-stopped
    env_file:
      - ./backend/.env
    volumes:
      - /mnt/coop/backend/media:/app/media
      - /mnt/coop/backend/staticfiles:/app/staticfiles

  web:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_SSO_API_URL: ${VITE_SSO_API_URL:-}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${WEB_PORT:-80}:80"
    volumes:
      - /mnt/coop/backend/media:/app/media:ro
      - /mnt/coop/backend/staticfiles:/app/staticfiles:ro
